AllCops:
  TargetRubyVersion: 3.2
  NewCops: enable
  SuggestExtensions: false
  Exclude:
    - 'vendor/**/*'

Layout/LineLength:
  Max: 140
  Exclude:
    - 'spec/**/*'

Metrics/AbcSize:
  Max: 30

Metrics/BlockLength:
  Exclude:
    - 'spec/**/*'
    - '.github/workflows/*.yml'

Metrics/ClassLength:
  Max: 120

Metrics/MethodLength:
  Max: 15

Metrics/ParameterLists:
  Max: 7

Naming/BlockForwarding:
  Enabled: false

Style/ArgumentsForwarding:
  Enabled: false

Style/Documentation:
  Enabled: false

Style/StringLiterals:
  Enabled: false
